<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Как вы будете зарабатывать на нейровидео и нейрофото?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; background: #F5F2EE; display: flex; align-items: center; justify-content: center; padding: 24px 16px; font-family: serif; }
.card { width: 100%; max-width: 560px; background: #fff; box-shadow: 0 4px 40px rgba(0,0,0,0.10); position: relative; overflow: hidden; }
.red-bar { height: 5px; background: #C8102E; }
.inner { padding: 40px 44px 48px; }
.head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 18px; border-bottom: 1px solid #E8E2DC; }
.head-brand { font-family: 'Playfair Display', serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #999; }
.head-date { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 500; letter-spacing: 0.2em; color: #C8102E; }
.hero-img { width: 100%; height: 220px; object-fit: cover; object-position: top; display: block; margin-bottom: 32px; }
.eyebrow { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.45em; text-transform: uppercase; color: #C8102E; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.eyebrow::before { content: ''; display: block; width: 18px; height: 1px; background: #C8102E; }
.intro-title { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 900; line-height: 1.05; color: #1A1614; margin-bottom: 6px; letter-spacing: -0.02em; }
.intro-title em { font-style: italic; color: #C8102E; }
.rule { width: 36px; height: 2px; background: #C8102E; margin: 24px 0; }
.intro-sub { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 300; color: #888; line-height: 1.8; margin-bottom: 36px; }
.btn-start { width: 100%; padding: 18px; background: #C8102E; border: none; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
.btn-start:hover { background: #A80D26; }
.prog-wrap { margin-bottom: 28px; }
.prog-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
.prog-label { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: #BBB; }
.prog-num { font-family: 'Playfair Display', serif; font-size: 13px; font-style: italic; color: #C8102E; }
.prog-track { height: 1px; background: #E8E2DC; position: relative; overflow: hidden; }
.prog-fill { position: absolute; top: 0; left: 0; height: 100%; background: #C8102E; transition: width 0.4s ease; }
.q-text { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #1A1614; line-height: 1.3; margin-bottom: 24px; }
.opt { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border: 1px solid #E8E2DC; margin-bottom: 8px; cursor: pointer; transition: all 0.18s; background: #FAF8F5; }
.opt:hover { border-color: #C8102E; background: #FDF5F6; }
.opt.sel { border-color: #C8102E; background: #C8102E; }
.opt-dot { width: 5px; height: 5px; background: #CCC; flex-shrink: 0; transform: rotate(45deg); transition: background 0.18s; }
.opt.sel .opt-dot { background: rgba(255,255,255,0.7); }
.opt-txt { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 300; color: #555; line-height: 1.5; transition: color 0.18s; }
.opt.sel .opt-txt { color: #fff; font-weight: 400; }
.btn-next { width: 100%; padding: 16px; margin-top: 20px; border: 1px solid #E8E2DC; background: transparent; color: #CCC; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; cursor: not-allowed; transition: all 0.2s; }
.btn-next.on { border-color: #C8102E; color: #C8102E; cursor: pointer; }
.btn-next.on:hover { background: #C8102E; color: #fff; }
.res-tag { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.45em; color: #C8102E; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.res-tag::before { content: ''; display: block; width: 18px; height: 1px; background: #C8102E; }
.res-title { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; color: #1A1614; line-height: 1.1; margin-bottom: 20px; letter-spacing: -0.02em; }
.res-desc { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 300; color: #666; line-height: 1.85; margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid #E8E2DC; }
.res-cta { background: #FDF5F6; border: 1px solid rgba(200,16,46,0.2); padding: 22px; margin-bottom: 24px; text-align: center; }
.res-cta-txt { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 400; color: #444; line-height: 1.7; margin-bottom: 10px; }
.res-cta-date { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: #C8102E; }
.btn-restart { width: 100%; padding: 14px; border: 1px solid #E8E2DC; background: transparent; color: #AAA; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.btn-restart:hover { border-color: #CCC; color: #888; }
.hidden { display: none; }
</style>
</head>

  { q: "Вы сейчас...", opts: ["Ищу новый источник дохода с нуля","Хочу добавить новую услугу к тому что уже делаю","Хочу ускорить работу и брать больше клиентов","Есть бизнес — хочу сократить расходы на контент"] },
  { q: "Сколько хотите зарабатывать на нейровидео и нейрофото в месяц?", opts: ["30–50 тыс. — хочу стабильный доп. доход","50–100 тыс. — хочу перейти на фриланс","100–200 тыс. — хочу полностью сменить сферу","Больше — я мыслю масштабно =)"] },
  { q: "Что у вас есть прямо сейчас?", opts: ["Ничего — только желание и телефон","Есть клиенты, но нет навыков нейроконтента","Есть навыки, но нет клиентов","Есть всё — не хватает системы"] },
  { q: "Сколько времени готовы тратить на старте?", opts: ["1–2 часа в день — совмещаю с основной работой","Полдня — серьёзно настроена","Готова погрузиться полностью","Хочу автоматизировать и работать минимум"] }

const results = {
  0: { tag:"СТАРТ", title:"Первый доход за 2 недели", desc:"Ты новичок с нуля — и тебе нужен самый быстрый путь к первым деньгам. Нейрофото и аватары — самая простая точка входа. Один навык, первый клиент, первые 10–30 тысяч.", cta:"18 марта покажу с чего начать — с нуля, в прямом эфире" },
  1: { tag:"ФРИЛАНС", title:"Нейроконтент как услуга", desc:"У тебя уже есть база — и тебе нужно добавить услугу которая стоит дорого. Нейровидео для бизнеса — это чек от 30 до 100 тысяч за проект.", cta:"18 марта покажу как упаковать это в услугу — приходи в эфир" },
  2: { tag:"МАСШТАБ", title:"Агентство нейроконтента", desc:"Ты думаешь системно и хочешь масштаб. Нейросети позволяют вести 10–15 клиентов там где раньше был один.", cta:"18 марта покажу систему — как это работает изнутри" },
  3: { tag:"БИЗНЕС", title:"Автоматизация своего бизнеса", desc:"Тебе не нужны клиенты — тебе нужно сократить расходы и ускорить производство контента в разы. ИИ делает это за тебя.", cta:"18 марта покажу конкретные инструменты — приходи в эфир" }
};

let current = 0;
let answers = [];
let selected = null;

function show(id) {
  ['screen-intro','screen-quiz','screen-result'].forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startQuiz() {
  current = 0; answers = []; selected = null;
  renderQ();
  show('screen-quiz');
}

function renderQ() {
  const q = questions[current];
  document.getElementById('q-img').src = IMGS[current];
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('prog-num').textContent = (current+1) + ' / ' + questions.length;
  document.getElementById('prog-fill').style.width = (current/questions.length*100) + '%';
  const btn = document.getElementById('btn-next');
  btn.classList.remove('on'); btn.disabled = true;
  btn.textContent = current+1 < questions.length ? 'Следующий вопрос' : 'Узнать результат';
  selected = null;
  const cont = document.getElementById('options');
  cont.innerHTML = '';
  q.opts.forEach((txt, i) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.innerHTML = '<div class="opt-dot"></div><div class="opt-txt">' + txt + '</div>';
    div.onclick = () => selectOpt(i, div);
    cont.appendChild(div);
  });
}

function selectOpt(i, el) {
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  selected = i;
  const btn = document.getElementById('btn-next');
  btn.classList.add('on'); btn.disabled = false;
}

function nextQ() {
  if (selected === null) return;
  answers.push(selected);
  if (current+1 < questions.length) {
    current++;
    renderQ();
  } else {
    showResult();
  }
}

function showResult() {
  const count = [0,0,0,0];
  answers.forEach(a => count[a]++);
  const winner = count.indexOf(Math.max(...count));
  const r = results[winner];
  document.getElementById('res-tag').textContent = r.tag;
  document.getElementById('res-title').textContent = r.title;
  document.getElementById('res-desc').textContent = r.desc;
  document.getElementById('res-cta-txt').textContent = r.cta;
  show('screen-result');
}

function restart() {
  current = 0; answers = []; selected = null;
  show('screen-intro');
}
